services:

  # MySQL
  mysql:
    image: mysql:8.0.36
    container_name: origen_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Backend (.NET 10 API)
  backend:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: origen-backend:latest
    container_name: origen_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};AllowUserVariables=true;"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: origen-dashboard
      Jwt__Audience: origen-dashboard-client
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_0}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_1}
      Cors__AllowedOrigins__2: ${CORS_ORIGIN_2}
      Cors__AllowedOrigins__3: ${CORS_ORIGIN_3}
      AdminUsername: ${ADMIN_USERNAME}
      AdminPassword: ${ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:5000:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health 2>/dev/null || wget -qO- http://localhost:8080/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Svelte Frontend
  svelte:
    build:
      context: ../origen-dashboard-frontend
      dockerfile: Dockerfile
    image: origen-svelte:latest
    container_name: origen_svelte
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "127.0.0.1:3003:80"


volumes:
  mysql_data:
    name: origen_mysql_data
